<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>


<body>
    <div class="main fs-3 bg-dark text-white text-center pt-5 w-100 w-md-50  mx-auto  overflow-hidden" style="min-height: 100vh;width: 100%;">
        <div class="card-box">
            <h1 class="fs-1">Age-Calculator</h1>
            <p class="fs-4">M-549</p>

            <form onsubmit="calculateAge(); return false;" class="w-100 d-flex flex-column align-items-center">

                <label>Date of Birth:</label>

                <input type="date" id="dateOfBirth" class="form-control my-2" style="max-width: 300px; width: 100%;">

                <p id="result" class="fs-4">Your Age</p>

                <button type="submit" class="btn btn-primary">
                    Calculate
                </button>

            </form>

            <p class="text-center fs-5 text-secondary mt-5 p-3 mb-0">
                <small>
                    <i class="fas fa-code"></i> Developer Mohammad wasayullah <br>
                    &copy; All rights reserved 2026
                </small>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
